<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OchaT — Intelligent Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --purple-glow: rgba(124,58,237,0.25);
            --text: #f1f5f9;
            --muted: #64748b;
            --user-bg: #1e1b4b;
            --bot-bg: #0f172a;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Layout ── */
        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 0.5rem;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--purple), #4f46e5);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0.65rem 1rem;
            background: var(--purple);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .new-chat-btn:hover { opacity: 0.85; }

        .sidebar-section {
            flex: 1;
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            padding: 0 0.5rem;
            margin-bottom: 0.5rem;
        }

        .history-item {
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            font-size: 0.83rem;
            color: #94a3b8;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: var(--surface2); color: var(--text); }
        .history-item.active { background: var(--surface2); color: var(--text); }

        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0.5rem 0.75rem;
            border-radius: 10px;
            cursor: pointer;
        }

        .user-info:hover { background: var(--surface2); }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            flex-shrink: 0;
        }

        .user-name { font-size: 0.85rem; font-weight: 500; }
        .user-plan { font-size: 0.72rem; color: var(--muted); }

        /* ── Main Chat Area ── */
        .chat-area {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .topbar-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }

        .model-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 4px 12px;
            font-size: 0.75rem;
            color: var(--purple-light);
            font-weight: 500;
        }

        .model-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── Welcome Screen ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 1rem;
            text-align: center;
            padding: 3rem;
        }

        .welcome-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--purple), #4f46e5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 0.5rem;
        }

        .welcome h2 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .welcome p { color: var(--muted); font-size: 0.9rem; max-width: 360px; line-height: 1.6; }

        .suggestions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-top: 1rem;
            width: 100%;
            max-width: 480px;
        }

        .suggestion {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.82rem;
            color: #94a3b8;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .suggestion:hover {
            border-color: rgba(167,139,250,0.3);
            color: var(--text);
            background: #1e1b4b;
        }

        /* ── Message Bubbles ── */
        .message {
            display: flex;
            gap: 12px;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            margin-top: 2px;
        }

        .msg-avatar.bot-av {
            background: linear-gradient(135deg, var(--purple), #4f46e5);
        }

        .msg-avatar.user-av {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
        }

        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 14px;
            font-size: 0.9rem;
            line-height: 1.65;
            max-width: calc(100% - 48px);
        }

        .message.bot .bubble {
            background: var(--bot-bg);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
            color: #e2e8f0;
        }

        .message.user .bubble {
            background: var(--user-bg);
            border: 1px solid rgba(124,58,237,0.3);
            border-top-right-radius: 4px;
            color: #ddd6fe;
        }

        /* ── Typing indicator ── */
        .typing {
            display: flex;
            gap: 5px;
            padding: 0.75rem 1rem;
            align-items: center;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Input Area ── */
        .input-area {
            padding: 1rem 1.5rem 1.5rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0.6rem 0.6rem 0.6rem 1rem;
            max-width: 780px;
            margin: 0 auto;
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: rgba(167,139,250,0.4);
            box-shadow: 0 0 0 3px rgba(124,58,237,0.1);
        }

        #message {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            line-height: 1.5;
        }

        #message::placeholder { color: var(--muted); }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--purple);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.15s;
        }

        .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }

        .send-btn svg { width: 16px; height: 16px; fill: white; }

        .input-hint {
            text-align: center;
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.6rem;
        }

        /* ── Mobile ── */
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            padding: 4px;
        }

        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }

            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                width: 260px;
                z-index: 100;
                transition: left 0.3s ease;
            }

            .sidebar.open { left: 0; }

            .hamburger { display: flex; }

            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 99;
            }

            .overlay.show { display: block; }

            .messages { padding: 1rem; }
            .input-area { padding: 0.75rem 1rem 1rem; }
            .suggestions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="overlay id="overlay" onclick="closeSidebar()"></div>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <span class="logo-text">OchaT</span>
        </div>

        <button class="new-chat-btn" onclick="clearChat()">
            ＋ New Chat
        </button>

        <div class="sidebar-section">
            <div class="sidebar-label">Recent</div>
            <div class="history-item active">Current conversation</div>
            <div class="history-item">How to build an API</div>
            <div class="history-item">Python tips</div>
            <div class="history-item">Marketing ideas</div>
        </div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">U</div>
                <div>
                    <div class="user-name">User</div>
                    <div class="user-plan">Free Plan</div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <div class="chat-area">

        <!-- Topbar -->
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="hamburger" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title">OchaT Assistant</span>
            </div>
            <div class="model-badge">
                <span class="model-dot"></span>
                Gemini Flash
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="chat">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">✦</div>
                <h2>How can I help you?</h2>
                <p>Ask me anything — I'm powered by Google Gemini and ready to assist.</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="suggest(this)">✍️ Help me write an email</button>
                    <button class="suggestion" onclick="suggest(this)">💡 Give me a business idea</button>
                    <button class="suggestion" onclick="suggest(this)">🐍 Explain Python basics</button>
                    <button class="suggestion" onclick="suggest(this)">📱 How to build an app</button>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrap">
                <textarea id="message" placeholder="Ask anything..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>
            <div class="input-hint">OchaT can make mistakes. Verify important info.</div>
        </div>

    </div>
</div>

<script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("message");
    const welcome = document.getElementById("welcome");

    input.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    input.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    function suggest(btn) {
        input.value = btn.innerText.replace(/^.{2}/, "").trim();
        sendMessage();
    }

    async function sendMessage() {
        const message = input.value.trim();
        if (!message) return;

        if (welcome) welcome.style.display = "none";

        appendMessage("user", message);
        input.value = "";
        input.style.height = "auto";

        const typingId = showTyping();

        try {
            const response = await fetch("/gpt/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await response.json();
            removeTyping(typingId);
            appendMessage("bot", data.reply || data.error || "Something went wrong.");
        } catch (err) {
            removeTyping(typingId);
            appendMessage("bot", "Connection error. Please try again.");
        }
    }

    function appendMessage(role, text) {
        const isUser = role === "user";
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="msg-avatar ${isUser ? "user-av" : "bot-av"}">${isUser ? "U" : "✦"}</div>
            <div class="bubble">${text}</div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
        const id = "typing-" + Date.now();
        const div = document.createElement("div");
        div.className = "message bot";
        div.id = id;
        div.innerHTML = `
            <div class="msg-avatar bot-av">✦</div>
            <div class="bubble">
                <div class="typing">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function clearChat() {
        chat.innerHTML = `
            <div class="welcome" id="welcome">
                <div class="welcome-icon">✦</div>
                <h2>How can I help you?</h2>
                <p>Ask me anything — I'm powered by Google Gemini and ready to assist.</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="suggest(this)">✍️ Help me write an email</button>
                    <button class="suggestion" onclick="suggest(this)">💡 Give me a business idea</button>
                    <button class="suggestion" onclick="suggest(this)">🐍 Explain Python basics</button>
                    <button class="suggestion" onclick="suggest(this)">📱 How to build an app</button>
                </div>
            </div>`;
    }

    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
    }
</script>

</body>
</html>
