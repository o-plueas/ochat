<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova AI — Intelligent Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --border: rgba(255,255,255,0.07);
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --text: #f1f5f9;
            --muted: #64748b;
            --user-bg: #1e1b4b;
            --bot-bg: #0f172a;
        }

        html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        .app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.25rem 0.75rem;
            gap: 1rem;
            overflow: hidden;
        }

        .logo { display: flex; align-items: center; gap: 10px; padding: 0 0.5rem 0.5rem; border-bottom: 1px solid var(--border); }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--purple), #4f46e5); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
        .logo-text { font-size: 1.05rem; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 0.6rem; background: var(--purple); border: none; border-radius: 10px;
            color: white; font-size: 0.85rem; font-weight: 500; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: opacity 0.2s; width: 100%;
        }
        .new-chat-btn:hover { opacity: 0.85; }

        .sidebar-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); padding: 0 0.5rem; }

        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
        .history-list::-webkit-scrollbar { width: 3px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .history-item {
            padding: 0.6rem 0.75rem; border-radius: 8px; font-size: 0.82rem;
            color: #94a3b8; cursor: pointer; transition: background 0.15s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: flex; align-items: center; justify-content: space-between;
            gap: 6px; border: 1px solid transparent;
        }
        .history-item:hover { background: var(--surface2); color: var(--text); }
        .history-item.active { background: #1e1b4b; color: var(--purple-light); border-color: rgba(124,58,237,0.25); }

        .history-item-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

        .delete-btn {
            background: none; border: none; color: var(--muted); cursor: pointer;
            font-size: 0.8rem; padding: 2px 4px; border-radius: 4px;
            opacity: 0; transition: opacity 0.15s; flex-shrink: 0;
        }
        .history-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: #f87171; background: rgba(248,113,113,0.1); }

        .no-history { padding: 1rem 0.5rem; font-size: 0.8rem; color: var(--muted); text-align: center; }

        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 0.75rem; }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 0.5rem 0.75rem; border-radius: 10px; cursor: pointer; }
        .user-info:hover { background: var(--surface2); }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; color: white; flex-shrink: 0; }
        .user-name { font-size: 0.83rem; font-weight: 500; }
        .user-plan { font-size: 0.7rem; color: var(--muted); }

        /* ── Chat Area ── */
        .chat-area { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.9rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--surface); }
        .topbar-title { font-size: 0.92rem; font-weight: 600; }
        .model-badge { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 4px 12px; font-size: 0.73rem; color: var(--purple-light); font-weight: 500; }
        .model-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

        .messages { flex: 1; overflow-y: auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; scroll-behavior: smooth; }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── Welcome ── */
        .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 0.75rem; text-align: center; padding: 3rem; margin: auto; }
        .welcome-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--purple), #4f46e5); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .welcome h2 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(90deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome p { color: var(--muted); font-size: 0.87rem; max-width: 340px; line-height: 1.6; }

        .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; margin-top: 0.75rem; width: 100%; max-width: 460px; }
        .suggestion { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.8rem; color: #94a3b8; cursor: pointer; text-align: left; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .suggestion:hover { border-color: rgba(167,139,250,0.3); color: var(--text); background: #1e1b4b; }

        /* ── Messages ── */
        .message { display: flex; gap: 10px; max-width: 760px; width: 100%; margin: 0 auto; animation: fadeIn 0.2s ease; }
        .message.user { flex-direction: row-reverse; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 600; color: white; margin-top: 2px; }
        .bot-av { background: linear-gradient(135deg, var(--purple), #4f46e5); }
        .user-av { background: linear-gradient(135deg, #0891b2, #06b6d4); }

        .bubble { padding: 0.7rem 0.95rem; border-radius: 14px; font-size: 0.88rem; line-height: 1.65; max-width: calc(100% - 44px); }
        .message.bot .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 4px; color: #e2e8f0; }
        .message.user .bubble { background: var(--user-bg); border: 1px solid rgba(124,58,237,0.3); border-top-right-radius: 4px; color: #ddd6fe; }

        .typing { display: flex; gap: 5px; padding: 0.2rem 0; align-items: center; }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

        /* ── Input ── */
        .input-area { padding: 0.9rem 1.5rem 1.25rem; background: var(--surface); border-top: 1px solid var(--border); }
        .input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; padding: 0.55rem 0.55rem 0.55rem 1rem; max-width: 760px; margin: 0 auto; transition: border-color 0.2s; }
        .input-wrap:focus-within { border-color: rgba(167,139,250,0.4); box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }

        #message { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 0.9rem; font-family: 'Inter', sans-serif; resize: none; min-height: 24px; max-height: 120px; line-height: 1.5; }
        #message::placeholder { color: var(--muted); }

        .send-btn { width: 34px; height: 34px; border-radius: 9px; background: var(--purple); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.2s, transform 0.15s; }
        .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
        .send-btn svg { width: 15px; height: 15px; fill: white; }

        .input-hint { text-align: center; font-size: 0.68rem; color: var(--muted); margin-top: 0.5rem; }

        /* ── Mobile ── */
        .hamburger { display: none; background: none; border: none; color: var(--text); cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
        .overlay.show { display: block; }

        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { position: fixed; left: -280px; top: 0; height: 100vh; width: 260px; z-index: 100; transition: left 0.3s ease; }
            .sidebar.open { left: 0; }
            .hamburger { display: flex; }
            .messages { padding: 1rem; }
            .input-area { padding: 0.75rem 1rem 1rem; }
            .suggestions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <span class="logo-text">Nova AI</span>
        </div>

        <button class="new-chat-btn" onclick="newChat()">＋ New Chat</button>

        <div class="sidebar-label">Recent Chats</div>
        <div class="history-list" id="historyList"></div>

        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar">U</div>
                <div>
                    <div class="user-name">User</div>
                    <div class="user-plan">Free Plan</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="chat-area">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="hamburger" onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="topbar-title" id="topbarTitle">Nova AI Assistant</span>
            </div>
            <div class="model-badge"><span class="model-dot"></span>Gemini Flash</div>
        </div>

        <div class="messages" id="chat"></div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea id="message" placeholder="Ask anything..." rows="1"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
                </button>
            </div>
            <div class="input-hint">Nova AI can make mistakes. Verify important info.</div>
        </div>
    </div>
</div>

<script>
    // ── State ──
    let chats = {};         // { id: { title, messages: [{role, text}] } }
    let activeChatId = null;

    const chatEl     = document.getElementById("chat");
    const inputEl    = document.getElementById("message");
    const historyEl  = document.getElementById("historyList");
    const titleEl    = document.getElementById("topbarTitle");

    // ── Boot ──
    loadFromStorage();
    if (Object.keys(chats).length === 0) newChat();
    else openChat(Object.keys(chats)[0]);

    // ── Storage ──
    function saveToStorage() {
        try { localStorage.setItem("nova_chats", JSON.stringify(chats)); } catch(e) {}
    }

    function loadFromStorage() {
        try {
            const raw = localStorage.getItem("nova_chats");
            if (raw) chats = JSON.parse(raw);
        } catch(e) { chats = {}; }
    }

    // ── New Chat ──
    function newChat() {
        const id = "chat_" + Date.now();
        chats[id] = { title: "New Chat", messages: [] };
        activeChatId = id;
        saveToStorage();
        renderHistory();
        renderMessages();
    }

    // ── Open Chat ──
    function openChat(id) {
        activeChatId = id;
        renderHistory();
        renderMessages();
        closeSidebar();
    }

    // ── Delete Chat ──
    function deleteChat(e, id) {
        e.stopPropagation();
        delete chats[id];
        saveToStorage();

        const remaining = Object.keys(chats);
        if (remaining.length === 0) newChat();
        else if (activeChatId === id) openChat(remaining[0]);
        else renderHistory();
    }

    // ── Render Sidebar History ──
    function renderHistory() {
        historyEl.innerHTML = "";
        const ids = Object.keys(chats).reverse();

        if (ids.length === 0) {
            historyEl.innerHTML = '<div class="no-history">No chats yet</div>';
            return;
        }

        ids.forEach(id => {
            const chat = chats[id];
            const div = document.createElement("div");
            div.className = "history-item" + (id === activeChatId ? " active" : "");
            div.onclick = () => openChat(id);
            div.innerHTML = `
                <span class="history-item-text">💬 ${chat.title}</span>
                <button class="delete-btn" onclick="deleteChat(event, '${id}')" title="Delete">✕</button>
            `;
            historyEl.appendChild(div);
        });
    }

    // ── Render Messages ──
    function renderMessages() {
        chatEl.innerHTML = "";
        const current = chats[activeChatId];
        titleEl.textContent = current ? current.title : "Nova AI Assistant";

        if (!current || current.messages.length === 0) {
            showWelcome();
            return;
        }

        current.messages.forEach(msg => appendBubble(msg.role, msg.text, false));
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    // ── Welcome Screen ──
    function showWelcome() {
        chatEl.innerHTML = `
            <div class="welcome">
                <div class="welcome-icon">✦</div>
                <h2>How can I help you?</h2>
                <p>Ask me anything — powered by Google Gemini.</p>
                <div class="suggestions">
                    <button class="suggestion" onclick="suggest(this)">✍️ Help me write an email</button>
                    <button class="suggestion" onclick="suggest(this)">💡 Give me a business idea</button>
                    <button class="suggestion" onclick="suggest(this)">🐍 Explain Python basics</button>
                    <button class="suggestion" onclick="suggest(this)">📱 How to build an app</button>
                </div>
            </div>`;
    }

    // ── Suggestion Click ──
    function suggest(btn) {
        inputEl.value = btn.innerText.slice(3).trim();
        sendMessage();
    }

    // ── Send Message ──
    async function sendMessage() {
        const message = inputEl.value.trim();
        if (!message) return;

        // Clear welcome screen
        const welcome = chatEl.querySelector(".welcome");
        if (welcome) welcome.remove();

        // Save user message
        chats[activeChatId].messages.push({ role: "user", text: message });

        // Auto-title from first message
        if (chats[activeChatId].messages.length === 1) {
            chats[activeChatId].title = message.length > 30 ? message.slice(0, 30) + "…" : message;
            titleEl.textContent = chats[activeChatId].title;
        }

        saveToStorage();
        renderHistory();
        appendBubble("user", message);
        inputEl.value = "";
        inputEl.style.height = "auto";

        const typingId = showTyping();

        try {
            const res = await fetch("/gpt/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await res.json();
            removeTyping(typingId);

            const reply = data.reply || data.error || "Something went wrong.";
            chats[activeChatId].messages.push({ role: "bot", text: reply });
            saveToStorage();
            appendBubble("bot", reply);
        } catch(err) {
            removeTyping(typingId);
            appendBubble("bot", "Connection error. Please try again.");
        }
    }

    // ── Append Bubble ──
    function appendBubble(role, text, scroll = true) {
        const isUser = role === "user";
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.innerHTML = `
            <div class="msg-avatar ${isUser ? "user-av" : "bot-av"}">${isUser ? "U" : "✦"}</div>
            <div class="bubble">${text}</div>
        `;
        chatEl.appendChild(div);
        if (scroll) chatEl.scrollTop = chatEl.scrollHeight;
    }

    // ── Typing Indicator ──
    function showTyping() {
        const id = "t" + Date.now();
        const div = document.createElement("div");
        div.className = "message bot"; div.id = id;
        div.innerHTML = `<div class="msg-avatar bot-av">✦</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
        chatEl.appendChild(div);
        chatEl.scrollTop = chatEl.scrollHeight;
        return id;
    }

    function removeTyping(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    // ── Input Auto-resize ──
    inputEl.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    inputEl.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Mobile Sidebar ──
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("overlay").classList.toggle("show");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("open");
        document.getElementById("overlay").classList.remove("show");
    }
</script>
</body>
</html>
